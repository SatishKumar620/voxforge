services:
  - type: web
    name: voxforge
    runtime: node
    buildCommand: npm install && cd client && npm install && npm run build && cd ..
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MURF_API_KEY
        sync: false
      - key: PORT
        value: 5000
    autoDeploy: true
